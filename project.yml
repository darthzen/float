# XcodeGen spec — run `xcodegen generate` to produce Float.xcodeproj
# https://github.com/yonaskolb/XcodeGen
name: Float
options:
  bundleIdPrefix: Ash4d
  deploymentTarget:
    visionOS: "27.0"          # 27.0 for native Gaussian-splat / projective-light APIs
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    # Signing baked in here so `xcodegen generate` never reverts the Xcode UI values.
    DEVELOPMENT_TEAM: "5YR793D4UZ"   # Rick Ashford
    CODE_SIGN_STYLE: Automatic
packages:
  RealityKitContent:
    path: Packages/RealityKitContent   # RCP ShaderGraph assets (Stereo360 material) — see that package's README

targets:
  Float:
    type: application
    platform: visionOS
    dependencies:
      - package: RealityKitContent
    sources:
      - path: Float
        excludes:
          - "Resources/Textures/_raw/**"      # huge raw source imagery — never bundle (gitignored too)
          - "Resources/Textures/**/README.md" # per-folder drop-notes
          - "Resources/Textures/CREDITS.md"   # asset credits doc
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: Ash4d.Float
        INFOPLIST_FILE: Float/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Float/Resources/Float.entitlements
        GENERATE_INFOPLIST_FILE: NO
        TARGETED_DEVICE_FAMILY: "7"   # 7 = visionOS
        SWIFT_EMIT_LOC_STRINGS: YES
        ENABLE_PREVIEWS: YES
